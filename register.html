<!DOCTYPE html>
<!-- HTML5 sənəd tipi. -->
<html lang="en">
<!-- Sayt dili ingilis dili olaraq qeyd edilir. -->
<head>
  <!-- Head başlanğıcı. -->
  <meta charset="UTF-8" />
  <!-- UTF-8 simvol dəstəyi. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Mobil ekran uyğunluğu. -->
  <title>BookVerse | Sign Up</title>
  <!-- Səhifə başlığı. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!-- Şrift serverinə hazırlıq bağlantısı. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Xarici şrift resursuna ikinci hazırlıq bağlantısı. -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Inter şriftini gətirir. -->
  <link rel="stylesheet" href="style.css" />
  <!-- CSS faylı qoşulur. -->
</head>
<!-- Head sonu. -->
<body>
  <!-- Body başlanğıcı. -->
  <div class="page-shell auth-page-shell">
    <!-- Ümumi konteyner. -->
    <header class="site-header compact-header">
      <!-- Yuxarı hissə. -->
      <div class="brand-area">
        <!-- Brend qutusu. -->
        <div class="brand-mark">B</div>
        <!-- Logo işarəsi. -->
        <div>
          <!-- Mətn bloku. -->
          <p class="brand-caption">New Reader Registration</p>
          <!-- Kiçik üst yazı. -->
          <h1 class="brand-title">BookVerse</h1>
          <!-- Sayt adı. -->
        </div>
      </div>
      <!-- Brend bağlanır. -->
      <nav class="top-actions">
        <!-- Naviqasiya hissəsi. -->
        <a class="ghost-link" href="index.html">Home</a>
        <!-- Ana səhifəyə link. -->
        <a class="ghost-link" href="login.html">Login</a>
        <!-- Login səhifəsinə link. -->
      </nav>
      <!-- Naviqasiya bağlanır. -->
    </header>
    <!-- Header bağlanır. -->

    <main class="auth-main">
      <!-- Əsas məzmun sahəsi. -->
      <section class="auth-card">
        <!-- Qeydiyyat kartı. -->
        <div class="auth-intro">
          <!-- Tanıtım hissəsi. -->
          <span class="hero-badge">Create Account</span>
          <!-- Kiçik etiket. -->
          <h2>Join our online bookstore community</h2>
          <!-- Qeydiyyat başlığı. -->
          <p>Register with your basic information and simulate account creation for the project.</p>
          <!-- Açıqlama mətni. -->
        </div>
        <!-- auth-intro bağlanır. -->

        <form id="registerForm" class="auth-form">
          <!-- Qeydiyyat formu. -->
          <label>
            <!-- Ad sahəsi üçün label. -->
            <span>Full Name</span>
            <!-- Sahə başlığı. -->
            <input type="text" id="registerName" placeholder="Enter your full name" required />
            <!-- Ad daxil etmə sahəsi. -->
          </label>
          <!-- Label bağlanır. -->
          <label>
            <!-- Email üçün label. -->
            <span>Email Address</span>
            <!-- Sahə başlığı. -->
            <input type="email" id="registerEmail" placeholder="Enter your email" required />
            <!-- Email inputu. -->
          </label>
          <!-- Label bağlanır. -->
          <label>
            <!-- Şifrə üçün label. -->
            <span>Password</span>
            <!-- Sahə başlığı. -->
            <input type="password" id="registerPassword" placeholder="Create a password" required />
            <!-- Şifrə inputu. -->
          </label>
          <!-- Label bağlanır. -->
          <button class="solid-button auth-submit" type="submit">Sign Up</button>
          <!-- Formu göndərən düymə. -->
          <p class="auth-helper">Already registered? <a href="login.html">Login here</a>.</p>
          <!-- Alternativ keçid mətni. -->
          <p class="form-message" id="registerMessage"></p>
          <!-- Nəticə mesajı üçün boş sahə. -->
        </form>
        <!-- Form bağlanır. -->
      </section>
      <!-- auth-card bağlanır. -->
    </main>
    <!-- Main bağlanır. -->
  </div>
  <!-- page-shell bağlanır. -->
  <script src="app.js"></script>
  <!-- JavaScript faylı qoşulur. -->
</body>
<!-- Body bağlanır. -->
</html>
<!-- HTML bağlanır. -->
