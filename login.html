<!DOCTYPE html>
<!-- HTML5 sənəd tipi bildirilir. -->
<html lang="en">
<!-- Sənədin dili ingilis olaraq göstərilir. -->
<head>
  <!-- Head hissəsi başlayır. -->
  <meta charset="UTF-8" />
  <!-- UTF-8 kodlaşdırması təyin edilir. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Mobil uyğunluq üçün viewport təyin edilir. -->
  <title>BookVerse | Login</title>
  <!-- Brauzer tabında görünən başlıqdır. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!-- Google Fonts üçün ön bağlantıdır. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Şrift serverinə ikinci bağlantıdır. -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Inter şriftini layihəyə əlavə edir. -->
  <link rel="stylesheet" href="style.css" />
  <!-- Ümumi CSS faylını səhifəyə bağlayır. -->
</head>
<!-- Head bağlanır. -->
<body>
  <!-- Body başlayır. -->
  <div class="page-shell auth-page-shell">
    <!-- Bütün səhifəni saxlayan əsas konteynerdir. -->
    <header class="site-header compact-header">
      <!-- Sadələşdirilmiş yuxarı hissədir. -->
      <div class="brand-area">
        <!-- Brend hissəsi başlayır. -->
        <div class="brand-mark">B</div>
        <!-- Kiçik logo bloku. -->
        <div>
          <!-- Logo mətnlərini saxlayan div. -->
          <p class="brand-caption">Secure Access Demo</p>
          <!-- Kiçik üst başlıq. -->
          <h1 class="brand-title">BookVerse</h1>
          <!-- Saytın adı. -->
        </div>
      </div>
      <!-- Brend hissəsi bağlanır. -->
      <nav class="top-actions">
        <!-- Naviqasiya düymələri. -->
        <a class="ghost-link" href="index.html">Home</a>
        <!-- Ana səhifəyə keçid. -->
        <a class="ghost-link" href="register.html">Sign Up</a>
        <!-- Qeydiyyat səhifəsinə keçid. -->
      </nav>
      <!-- Naviqasiya bağlanır. -->
    </header>
    <!-- Header bağlanır. -->

    <main class="auth-main">
      <!-- Login səhifəsinin əsas hissəsi. -->
      <section class="auth-card">
        <!-- Login form kartı. -->
        <div class="auth-intro">
          <!-- Giriş mətnləri bölməsi. -->
          <span class="hero-badge">Welcome Back</span>
          <!-- Kiçik etiket. -->
          <h2>Login to your bookstore account</h2>
          <!-- Form başlığı. -->
          <p>Use your registered email and password to access the demo account area.</p>
          <!-- Form haqqında açıqlama. -->
        </div>
        <!-- auth-intro bağlanır. -->

        <form id="loginForm" class="auth-form">
          <!-- Login formu başlayır. id vasitəsilə JS bu formu tapır. -->
          <label>
            <!-- Email sahəsi üçün label. -->
            <span>Email Address</span>
            <!-- Sahənin başlığı. -->
            <input type="email" id="loginEmail" placeholder="Enter your email" required />
            <!-- Email inputu. required boş göndərilməsinin qarşısını alır. -->
          </label>
          <!-- Birinci label bağlanır. -->
          <label>
            <!-- Şifrə sahəsi üçün label. -->
            <span>Password</span>
            <!-- Sahənin başlığı. -->
            <input type="password" id="loginPassword" placeholder="Enter your password" required />
            <!-- Şifrə inputu. type="password" yazılan simvolları gizlədir. -->
          </label>
          <!-- İkinci label bağlanır. -->
          <button class="solid-button auth-submit" type="submit">Login</button>
          <!-- Form göndərmə düyməsi. type="submit" form submit hadisəsini işə salır. -->
          <p class="auth-helper">No account yet? <a href="register.html">Create one here</a>.</p>
          <!-- Yardımçı keçid mətni. -->
          <p class="form-message" id="loginMessage"></p>
          <!-- JS burada nəticə mesajı göstərəcək. -->
        </form>
        <!-- Login formu bağlanır. -->
      </section>
      <!-- auth-card bağlanır. -->
    </main>
    <!-- Main bağlanır. -->
  </div>
  <!-- page-shell bağlanır. -->
  <script src="app.js"></script>
  <!-- JavaScript faylı qoşulur. -->
</body>
<!-- Body bağlanır. -->
</html>
<!-- HTML bağlanır. -->
